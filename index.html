<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klassic Restaurant - Feedback</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
background-color:#fcf2e0;
background-image:radial-gradient(rgba(84, 64, 62, 0.05) 1px, transparent 0);
background-size:24px 24px;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px 20px;
}
.container{
width:100%;
max-width:600px;
background:#ffffff;
border-radius:24px;
overflow:hidden;
box-shadow:0 15px 45px rgba(84, 64, 62, 0.08), 0 1px 3px rgba(84, 64, 62, 0.02);
border:1px solid rgba(84, 64, 62, 0.05);
}
.header{
background:#54403e;
padding:40px 32px;
text-align:center;
color:#fcf2e0;
position:relative;
display: flex;
flex-direction: column;
align-items: center;
gap: 12px;
}
.brand-logo {
height: 65px;
width: auto;
object-fit: contain;
filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
}
.header h1{
font-size:28px;
font-weight: 700;
letter-spacing: -0.5px;
margin-bottom:4px;
color: #ffffff;
}
.header h1 span {
color: #fcf2e0;
opacity: 0.9;
}
.header p{
opacity:.75;
font-size:14px;
font-weight: 400;
}
.form-section{
padding:40px 32px;
}
.input-group{
margin-bottom:24px;
}
label{
display:block;
margin-bottom:8px;
font-weight:600;
font-size:14px;
color:#54403e;
letter-spacing: -0.1px;
}
input,
textarea{
width:100%;
padding:14px 16px;
border:1px solid rgba(84, 64, 62, 0.15);
border-radius:12px;
font-size:15px;
color: #54403e;
background-color: rgba(252, 242, 224, 0.3);
transition: all .2s ease;
}
input::placeholder,
textarea::placeholder {
color: #9ca3af;
}
input:focus,
textarea:focus{
outline:none;
border-color:#54403e;
background-color: #fff;
box-shadow:0 0 0 4px rgba(84, 64, 62, 0.1);
}
textarea{
height:110px;
resize:none;
}
.rating-box{
margin-bottom:24px;
background: rgba(252, 242, 224, 0.4);
padding: 16px;
border-radius: 12px;
border: 1px solid rgba(84, 64, 62, 0.08);
display: flex;
justify-content: space-between;
align-items: center;
}
.rating-title{
font-weight:600;
font-size: 14px;
color:#54403e;
}
.stars{
display:flex;
flex-direction:row-reverse;
justify-content:flex-end;
}
.stars input{
display:none;
}
.stars label{
font-size:28px;
color:#e5e7eb;
cursor:pointer;
transition:.2s;
margin-left:4px;
}
.stars label:hover,
.stars label:hover ~ label,
.stars input:checked ~ label{
color:#54403e;
}
button{
width:100%;
padding:16px;
border:none;
border-radius:12px;
background:#54403e;
color:#fcf2e0;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:all .2s ease;
margin-top: 8px;
box-shadow: 0 4px 12px rgba(84, 64, 62, 0.15);
}
button:hover{
background:#423230;
transform: translateY(-1px);
box-shadow: 0 6px 20px rgba(84, 64, 62, 0.25);
}
button:active {
transform: translateY(0);
}
.success{
display:none;
margin-top:20px;
padding:16px;
background:#ecfdf5;
color:#065f46;
border-radius:12px;
text-align:center;
font-weight:600;
font-size: 15px;
border: 1px solid #a7f3d0;
animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
from { opacity: 0; transform: translateY(10px); }
to { opacity: 1; transform: translateY(0); }
}
.footer{
text-align:center;
padding:24px;
font-size:12px;
color:rgba(84, 64, 62, 0.5);
border-top:1px solid rgba(84, 64, 62, 0.05);
background: #fafafa;
letter-spacing: 1px;
font-weight: 500;
}
</style>
</head>
<body>
<div class="container">
<div class="header">
<img src="klassic logo.png" alt="Klassic Restaurant Logo" class="brand-logo">
<h1>Klassic <span>Restaurant</span></h1>
<p>Your feedback helps us improve every day</p>
</div>
<div class="form-section">
<form id="feedbackForm">
<div class="input-group">
<label>Name (Optional)</label>
<input type="text" name="name" placeholder="Enter your name">
</div>
<div class="input-group">
<label>Phone Number (Optional)</label>
<input type="text" name="phone" placeholder="Enter phone number">
</div>

<div class="rating-box">
<div class="rating-title">Food Quality</div>
<div class="stars">
<input type="radio" id="food5" name="foodRating" value="5" checked>
<label for="food5">★</label>
<input type="radio" id="food4" name="foodRating" value="4">
<label for="food4">★</label>
<input type="radio" id="food3" name="foodRating" value="3">
<label for="food3">★</label>
<input type="radio" id="food2" name="foodRating" value="2">
<label for="food2">★</label>
<input type="radio" id="food1" name="foodRating" value="1">
<label for="food1">★</label>
</div>
</div>

<div class="rating-box">
<div class="rating-title">Service Rating</div>
<div class="stars">
<input type="radio" id="service5" name="serviceRating" value="5" checked>
<label for="service5">★</label>
<input type="radio" id="service4" name="serviceRating" value="4">
<label for="service4">★</label>
<input type="radio" id="service3" name="serviceRating" value="3">
<label for="service3">★</label>
<input type="radio" id="service2" name="serviceRating" value="2">
<label for="service2">★</label>
<input type="radio" id="service1" name="serviceRating" value="1">
<label for="service1">★</label>
</div>
</div>

<div class="rating-box">
<div class="rating-title">Cleanliness Rating</div>
<div class="stars">
<input type="radio" id="clean5" name="cleanlinessRating" value="5" checked>
<label for="clean5">★</label>
<input type="radio" id="clean4" name="cleanlinessRating" value="4">
<label for="clean4">★</label>
<input type="radio" id="clean3" name="cleanlinessRating" value="3">
<label for="clean3">★</label>
<input type="radio" id="clean2" name="cleanlinessRating" value="2">
<label for="clean2">★</label>
<input type="radio" id="clean1" name="cleanlinessRating" value="1">
<label for="clean1">★</label>
</div>
</div>

<div class="input-group">
<label>Comments</label>
<textarea name="comments" placeholder="Tell us about your dining experience..."></textarea>
</div>
<button type="submit">Submit Feedback</button>
<div class="success" id="successMessage">
✨ Thank you for your feedback!
</div>
</form>
</div>
<div class="footer">
THANK YOU FOR DINING WITH US
</div>
</div>
<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbwCWq2U8lXMuRcqdiGQFFsmr9m3d7jdCptqtH-QmiHs8eop9Gn7z_UtaBGd41V_wllG/exec";
document.getElementById("feedbackForm").addEventListener("submit", function(e){
e.preventDefault();
const formData = new FormData(this);
fetch(scriptURL,{
method:"POST",
body:formData,
mode:"no-cors"
});
document.getElementById("successMessage").style.display="block";
this.reset();
setTimeout(()=>{
document.getElementById("successMessage").style.display="none";
},3000);
});
</script>
</body>
</html>
