<!DOCTYPE html>
<html>
<head>
<title>Restaurant Feedbackasd</title>
</head>
<body>

<h2>Restaurant Feedback</h2>

<form id="feedbackForm">

<input type="text" name="name" placeholder="Name"><br><br>

<input type="text" name="phone" placeholder="Phone"><br><br>

<label>Food Rating</label>
<select name="foodRating">
<option>5</option>
<option>4</option>
<option>3</option>
<option>2</option>
<option>1</option>
</select><br><br>

<label>Service Rating</label>
<select name="serviceRating">
<option>5</option>
<option>4</option>
<option>3</option>
<option>2</option>
<option>1</option>
</select><br><br>

<label>Cleanliness Rating</label>
<select name="cleanlinessRating">
<option>5</option>
<option>4</option>
<option>3</option>
<option>2</option>
<option>1</option>
</select><br><br>

<textarea name="comments" placeholder="Comments"></textarea><br><br>

<button type="submit">Submit</button>

</form>

<script>
const scriptURL = "YOUR_GOOGLE_SCRIPT_URL";

document.getElementById("feedbackForm")
.addEventListener("submit", function(e) {

  e.preventDefault();

  const formData = new FormData(this);

  fetch(scriptURL, {
    method: "POST",
    body: formData,
    mode: "no-cors"
  });

  alert("Thank you for your feedback!");
  this.reset();
});
</script>

</body>
</html>
