<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Restaurant Feedback</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:linear-gradient(135deg,#1f2937,#111827);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:650px;
background:#fff;
border-radius:24px;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.header{
background:linear-gradient(135deg,#f59e0b,#d97706);
padding:40px 30px;
text-align:center;
color:white;
}

.header h1{
font-size:34px;
margin-bottom:8px;
}

.header p{
opacity:.95;
font-size:15px;
}

.form-section{
padding:30px;
}

.input-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:8px;
font-weight:600;
color:#374151;
}

input,
textarea{
width:100%;
padding:14px;
border:1px solid #d1d5db;
border-radius:12px;
font-size:15px;
transition:.2s;
}

input:focus,
textarea:focus{
outline:none;
border-color:#f59e0b;
box-shadow:0 0 0 4px rgba(245,158,11,.15);
}

textarea{
height:120px;
resize:none;
}

.rating-box{
margin-bottom:25px;
}

.rating-title{
margin-bottom:10px;
font-weight:600;
color:#374151;
}

.stars{
display:flex;
flex-direction:row-reverse;
justify-content:flex-end;
}

.stars input{
display:none;
}

.stars label{
font-size:34px;
color:#d1d5db;
cursor:pointer;
transition:.2s;
margin-right:4px;
}

.stars label:hover,
.stars label:hover ~ label,
.stars input:checked ~ label{
color:#fbbf24;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:12px;
background:#f59e0b;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#d97706;
}

.success{
display:none;
margin-top:20px;
padding:14px;
background:#dcfce7;
color:#166534;
border-radius:12px;
text-align:center;
font-weight:600;
}

.footer{
text-align:center;
padding:15px;
font-size:13px;
color:#6b7280;
border-top:1px solid #eee;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>🍽 Restaurant Feedback</h1>
<p>Your feedback helps us improve every day</p>
</div>

<div class="form-section">

<form id="feedbackForm">

<div class="input-group">
<label>Name (Optional)</label>
<input type="text" name="name" placeholder="Enter your name">
</div>

<div class="input-group">
<label>Phone Number (Optional)</label>
<input type="text" name="phone" placeholder="Enter phone number">
</div>

<div class="rating-box">
<div class="rating-title">Food Quality</div>

<div class="stars">
<input type="radio" id="food5" name="foodRating" value="5" checked>
<label for="food5">★</label>

<input type="radio" id="food4" name="foodRating" value="4">
<label for="food4">★</label>

<input type="radio" id="food3" name="foodRating" value="3">
<label for="food3">★</label>

<input type="radio" id="food2" name="foodRating" value="2">
<label for="food2">★</label>

<input type="radio" id="food1" name="foodRating" value="1">
<label for="food1">★</label>
</div>
</div>

<div class="input-group">
<label>Service Rating</label>

<select name="serviceRating" style="width:100%;padding:14px;border-radius:12px;border:1px solid #d1d5db;">
<option value="5">⭐⭐⭐⭐⭐ Excellent</option>
<option value="4">⭐⭐⭐⭐ Very Good</option>
<option value="3">⭐⭐⭐ Good</option>
<option value="2">⭐⭐ Fair</option>
<option value="1">⭐ Poor</option>
</select>
</div>

<div class="input-group">
<label>Cleanliness Rating</label>

<select name="cleanlinessRating" style="width:100%;padding:14px;border-radius:12px;border:1px solid #d1d5db;">
<option value="5">⭐⭐⭐⭐⭐ Excellent</option>
<option value="4">⭐⭐⭐⭐ Very Good</option>
<option value="3">⭐⭐⭐ Good</option>
<option value="2">⭐⭐ Fair</option>
<option value="1">⭐ Poor</option>
</select>
</div>

<div class="input-group">
<label>Comments</label>
<textarea
name="comments"
placeholder="Tell us about your dining experience..."></textarea>
</div>

<button type="submit">
Submit Feedback
</button>

<div class="success" id="successMessage">
✅ Thank you for your feedback!
</div>

</form>

</div>

<div class="footer">
Thank you for dining with us ❤️
</div>

</div>

<script>

const scriptURL =
"https://script.google.com/macros/s/AKfycbwCWq2U8lXMuRcqdiGQFFsmr9m3d7jdCptqtH-QmiHs8eop9Gn7z_UtaBGd41V_wllG/exec";

document.getElementById("feedbackForm")
.addEventListener("submit", function(e){

e.preventDefault();

const formData = new FormData(this);

fetch(scriptURL,{
method:"POST",
body:formData,
mode:"no-cors"
});

document.getElementById("successMessage").style.display="block";

this.reset();

setTimeout(()=>{
document.getElementById("successMessage").style.display="none";
},3000);

});

</script>

</body>
</html>
